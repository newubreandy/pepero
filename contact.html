<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            align-items: flex-start;
            padding: 70px 16px 80px;
        }

        #home-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            background: var(--toggle-bg);
            border: none;
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 14px;
            cursor: pointer;
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            font-family: sans-serif;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #home-btn:hover {
            background: var(--btn-bg);
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-color);
            opacity: 0.6;
            margin-bottom: 28px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--number-bg);
            border-radius: 8px;
            font-size: 15px;
            background-color: var(--number-bg);
            color: var(--text-color);
            box-sizing: border-box;
            transition: border-color 0.2s, background-color 0.3s, color 0.3s;
            outline: none;
            font-family: sans-serif;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--btn-bg);
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--btn-bg);
            color: var(--btn-color);
            border: none;
            border-radius: 8px;
            transition: background-color 0.3s;
            margin-top: 4px;
        }

        .submit-btn:hover {
            background-color: var(--btn-hover);
        }

        .success-msg {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .success-msg .check-icon {
            font-size: 52px;
            margin-bottom: 16px;
        }

        .success-msg h2 {
            margin-bottom: 8px;
            font-size: 20px;
        }

        .success-msg p {
            font-size: 14px;
            opacity: 0.6;
            margin-bottom: 28px;
        }

        .home-btn-large {
            display: inline-block;
            padding: 12px 32px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--btn-bg);
            color: var(--btn-color);
            border: none;
            border-radius: 8px;
            transition: background-color 0.3s;
            text-decoration: none;
        }

        .home-btn-large:hover {
            background-color: var(--btn-hover);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--container-bg);
            border-top: 1px solid var(--number-bg);
            display: flex;
            justify-content: center;
            padding: 10px 0;
            transition: background-color 0.3s;
        }

        .bottom-nav a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 13px;
            font-family: sans-serif;
            padding: 6px 24px;
            border-radius: 20px;
            transition: background-color 0.2s, color 0.2s;
            opacity: 0.6;
        }

        .bottom-nav a:hover,
        .bottom-nav a.active {
            background: var(--btn-bg);
            color: #fff;
            opacity: 1;
        }
    </style>
</head>
<body>
    <a href="index.html" id="home-btn">🏠 Home</a>
    <button id="theme-toggle" aria-label="Toggle dark/light mode">🌙</button>

    <div class="container">
        <h1>제휴 문의</h1>
        <p class="subtitle">제휴 및 광고 관련 문의를 남겨주시면 빠르게 답변드리겠습니다.</p>

        <form id="contact-form" action="https://formspree.io/f/mlgpgnan" method="POST">
            <div class="form-group">
                <label for="company">회사/브랜드명 *</label>
                <input type="text" id="company" name="company" placeholder="회사명 또는 브랜드명" required>
            </div>
            <div class="form-group">
                <label for="name">담당자 이름 *</label>
                <input type="text" id="name" name="name" placeholder="홍길동" required>
            </div>
            <div class="form-group">
                <label for="email">이메일 *</label>
                <input type="email" id="email" name="email" placeholder="example@company.com" required>
            </div>
            <div class="form-group">
                <label for="type">문의 유형</label>
                <select id="type" name="type">
                    <option value="">선택해주세요</option>
                    <option value="광고">광고 제휴</option>
                    <option value="콘텐츠">콘텐츠 협업</option>
                    <option value="기타">기타</option>
                </select>
            </div>
            <div class="form-group">
                <label for="message">문의 내용 *</label>
                <textarea id="message" name="message" placeholder="문의 내용을 자세히 적어주세요." required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의 보내기</button>
        </form>

        <div class="success-msg" id="success-msg">
            <div class="check-icon">✅</div>
            <h2>문의가 접수되었습니다!</h2>
            <p>빠른 시일 내에 연락드리겠습니다.</p>
            <a href="index.html" class="home-btn-large">🏠 홈으로 돌아가기</a>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html">Home</a>
        <a href="contact.html" class="active">Contact Us</a>
    </nav>

    <script>
        const toggle = document.getElementById('theme-toggle');
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            toggle.textContent = '☀️';
        }
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            toggle.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        const form = document.getElementById('contact-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = form.querySelector('.submit-btn');
            btn.disabled = true;
            btn.textContent = '전송 중...';

            const res = await fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            });

            if (res.ok) {
                form.style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
            } else {
                btn.disabled = false;
                btn.textContent = '문의 보내기';
                alert('전송 중 오류가 발생했습니다. 다시 시도해주세요.');
            }
        });
    </script>
</body>
</html>
